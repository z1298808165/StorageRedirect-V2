name: Build StorageRedirect Module

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  MODULE_NAME: StorageRedirect
  MODULE_ID: StorageRedirect

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./StorageRedirect-V2
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26b
        add-to-path: true

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Get version
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "1.0.0-${GITHUB_SHA::7}")
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Build WebUI
      run: |
        cd webui
        npm install
        npm run build

    - name: Build Daemon (arm64)
      run: |
        cd daemon
        GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" -o ../module/bin/sr-daemon-arm64 .

    - name: Build Daemon (arm)
      run: |
        cd daemon
        GOOS=android GOARCH=arm CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" -o ../module/bin/sr-daemon-arm .

    - name: Build daemonctl (arm64)
      run: |
        cd daemon/cmd/daemonctl
        GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../../module/bin/daemonctl-arm64 .

    - name: Build daemonctl (arm)
      run: |
        cd daemon/cmd/daemonctl
        GOOS=android GOARCH=arm CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../../module/bin/daemonctl-arm .

    - name: Create wrapper scripts
      run: |
        cat > module/bin/sr-daemon << 'EOF'
        #!/system/bin/sh
        # StorageRedirect Daemon wrapper
        ARCH=$(getprop ro.product.cpu.abi)
        MODDIR="${0%/*}/.."
        
        case "$ARCH" in
            arm64-v8a)
                exec "$MODDIR/bin/sr-daemon-arm64" "$@"
                ;;
            armeabi-v7a|armeabi)
                exec "$MODDIR/bin/sr-daemon-arm" "$@"
                ;;
            *)
                echo "Unsupported architecture: $ARCH"
                exit 1
                ;;
        esac
        EOF
        
        cat > module/bin/daemonctl << 'EOF'
        #!/system/bin/sh
        # StorageRedirect daemonctl wrapper
        ARCH=$(getprop ro.product.cpu.abi)
        MODDIR="${0%/*}/.."
        
        case "$ARCH" in
            arm64-v8a)
                exec "$MODDIR/bin/daemonctl-arm64" "$@"
                ;;
            armeabi-v7a|armeabi)
                exec "$MODDIR/bin/daemonctl-arm" "$@"
                ;;
            *)
                echo "Unsupported architecture: $ARCH"
                exit 1
                ;;
        esac
        EOF
        
        chmod +x module/bin/sr-daemon module/bin/daemonctl

    - name: Update module.prop
      run: |
        sed -i "s/version=.*/version=${{ env.VERSION }}/" module/module.prop
        VERSION_CODE=$(echo "${{ env.VERSION }}" | tr -d '.' | cut -d'-' -f1)
        # Ensure versionCode is numeric
        if ! [[ "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
          VERSION_CODE=$(git rev-list --count HEAD)
        fi
        sed -i "s/versionCode=.*/versionCode=$VERSION_CODE/" module/module.prop

    - name: Create module zip
      run: |
        mkdir -p release
        cd module
        zip -r "../release/${{ env.MODULE_NAME }}-${{ env.VERSION }}.zip" . -x "*.git*" -x "*.DS_Store"
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MODULE_NAME }}-${{ env.VERSION }}
        path: StorageRedirect-V2/release/*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: StorageRedirect-V2/release/*.zip
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
